apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-html
  namespace: tls-apache
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kubernetes Cert-Manager Webserver Test</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .container {
                background-color: #ffffff;
                padding: 40px;
                border-radius: 8px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
                text-align: center;
                max-width: 500px;
            }

            h1 {
                color: #2BBA7E;
                font-size: 28px;
                margin-bottom: 20px;
            }

            p {
                color: #666666;
                font-size: 16px;
                line-height: 1.5;
                margin-bottom: 30px;
            }

            .logo {
                max-width: 150px;
                margin-bottom: 30px;
            }
            
            .hostname {
                background-color: #f0f8f5;
                padding: 10px;
                border-radius: 4px;
                font-family: 'Courier New', monospace;
                color: #1a6b47;
                font-size: 14px;
                margin: 15px 0;
            }
            
            #countdown {
                color: #2BBA7E;
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 20px;
                height: 24px;
                line-height: 24px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img src="https://docs.digicert.com/en/image/uuid-4f2ee06d-5de6-d07d-3d40-86c9b376ac6c.png" alt="Site Logo" class="logo">
            <h1>K8s Cert-Manager Webserver Test</h1>
            <p>Ingress Test Port 443 / HTTPS</p>
            <div class="hostname">
                <strong>Domain:</strong> istio.tlsguru.io<br>
                <strong>Cluster:</strong> mrudloff-k8s<br>
                <strong>Region:</strong> us-east-2
            </div>
            <div id="countdown"></div>
        </div>

        <script>
            let countdownInterval;
            let countdownSeconds = 30;

            function updateCountdown() {
                const countdownDiv = document.getElementById('countdown');
                countdownDiv.textContent = `Refresh in ${countdownSeconds}s`;

                if (countdownSeconds === 0) {
                    window.location.reload();
                } else {
                    countdownSeconds--;
                }
            }

            function startCountdown() {
                updateCountdown();
                countdownInterval = setInterval(updateCountdown, 1000);
            }

            startCountdown();
        </script>
    </body>
    </html>
